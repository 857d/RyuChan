name: Auto Update Article Passwords

on:
  workflow_dispatch:  # 只保留手动触发，让 cron-job.org 来调用

jobs:
  update-passwords:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install glob gray-matter
      - run: node scripts/update-passwords.js
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config.user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/blog/
          git diff --staged --quiet || git commit -m "chore: auto update article passwords"
          git push
