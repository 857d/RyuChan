name: Auto Update Article Passwords

on:
  schedule:
    - cron: '0 18 * * *'   # 北京时间次日 02:00
    - cron: '0 6 * * *'    # 北京时间 14:00
  workflow_dispatch:

jobs:
  update-passwords:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install glob gray-matter
      - run: node scripts/update-passwords.js
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/blog/
          git diff --staged --quiet || git commit -m "chore: auto update article passwords"
          git push
