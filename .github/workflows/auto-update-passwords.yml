name: Auto Update Article Passwords

on:
  schedule:
    # 每天 UTC 0 点运行（北京时间 8 点）
    - cron: '0 0 * * *'
  workflow_dispatch:   # 允许手动触发

jobs:
  update-passwords:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允许推送代码
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install glob gray-matter

      - name: Run password update script
        run: node scripts/update-passwords.js

      - name: Commit and push changes
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/blog/
          git diff --staged --quiet || git commit -m "chore: auto update article passwords [skip ci]"
          git push
