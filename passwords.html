<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加密文章密码查看</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .copy-btn { cursor: pointer; transition: all 0.2s; }
        .copy-btn:hover { background-color: #3b82f6; color: white; }
        .loading { display: inline-block; width: 20px; height: 20px; border: 2px solid #f3f3f3; border-top: 2px solid #ef4444; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-6">
    <div class="max-w-5xl mx-auto">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <div class="bg-gradient-to-r from-red-600 to-red-700 px-6 py-5">
                <h1 class="text-2xl md:text-3xl font-bold text-white flex items-center gap-2">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
                    </svg>
                    加密文章密码查看
                </h1>
                <p class="text-red-100 text-sm mt-1">实时从 GitHub 读取，数据自动更新</p>
            </div>

            <!-- 管理员密码验证 -->
            <div id="auth-panel" class="p-6">
                <div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 mb-4">
                    <div class="flex items-center">
                        <svg class="w-5 h-5 text-yellow-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                        </svg>
                        <span class="text-yellow-800 text-sm">此页面受密码保护，请输入管理员密码查看</span>
                    </div>
                </div>
                <div class="max-w-md mx-auto">
                    <label class="block text-sm font-medium text-gray-700 mb-2">管理员密码</label>
                    <input type="password" id="admin-password" class="w-full border rounded-lg px-4 py-2 mb-4" placeholder="请输入管理员密码" autofocus />
                    <button id="verify-btn" class="w-full bg-red-600 hover:bg-red-700 text-white py-2 rounded-lg transition">验证</button>
                    <p id="error-msg" class="text-red-500 text-sm mt-3 hidden text-center"></p>
                </div>
            </div>

            <!-- 密码列表（初始隐藏） -->
            <div id="result" class="p-4" style="display: none;">
                <div class="text-center text-gray-400 py-8">
                    <div class="loading mx-auto"></div>
                    <p class="mt-2">正在加载密码列表...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 👇 在这里设置您的管理员密码
        const ADMIN_PASSWORD = "Aa123321";
        
        const authPanel = document.getElementById('auth-panel');
        const resultDiv = document.getElementById('result');
        const verifyBtn = document.getElementById('verify-btn');
        const passwordInput = document.getElementById('admin-password');
        const errorMsg = document.getElementById('error-msg');

        // 检查是否已经验证过（sessionStorage）
        if (sessionStorage.getItem('admin_verified') === 'true') {
            authPanel.style.display = 'none';
            resultDiv.style.display = 'block';
            fetchPasswords();
        }

        verifyBtn.addEventListener('click', () => {
            const entered = passwordInput.value;
            if (entered === ADMIN_PASSWORD) {
                sessionStorage.setItem('admin_verified', 'true');
                authPanel.style.display = 'none';
                resultDiv.style.display = 'block';
                errorMsg.classList.add('hidden');
                fetchPasswords();
            } else {
                errorMsg.textContent = '管理员密码错误，无权查看！';
                errorMsg.classList.remove('hidden');
            }
        });

        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verifyBtn.click();
        });

        async function fetchPasswords() {
            resultDiv.innerHTML = '<div class="text-center py-8"><div class="loading mx-auto"></div><p class="mt-2 text-gray-500">正在扫描文章...</p></div>';

            try {
                // 获取文章列表（无需 Token，因为仓库是公开的）
                const filesUrl = 'https://api.github.com/repos/857d/RyuChan/contents/src/content/blog';
                const filesRes = await fetch(filesUrl);
                if (!filesRes.ok) throw new Error('获取文件列表失败：' + filesRes.status);
                const files = await filesRes.json();
                const mdFiles = files.filter(f => f.name.endsWith('.md') || f.name.endsWith('.mdx'));

                const results = [];
                for (const file of mdFiles) {
                    try {
                        const contentRes = await fetch(file.download_url);
                        const content = await contentRes.text();
                        
                        // 解析 password
                        const passwordMatch = content.match(/password:\s*['"]?([^'"\n]+)['"]?/);
                        if (passwordMatch) {
                            const titleMatch = content.match(/title:\s*['"]?([^'"\n]+)['"]?/);
                            const slug = file.name.replace(/\.(md|mdx)$/, '');
                            results.push({
                                title: titleMatch ? titleMatch[1] : slug,
                                slug: slug,
                                password: passwordMatch[1].trim()
                            });
                        }
                    } catch (err) {
                        console.warn('读取文件失败:', file.name, err);
                    }
                }

                if (results.length === 0) {
                    resultDiv.innerHTML = '<div class="text-center py-8 text-gray-400"><svg class="w-12 h-12 mx-auto mb-2 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg><p>未找到加密文章</p></div>';
                    return;
                }

                // 生成表格
                let html = `
                    <div class="overflow-x-auto">
                        <table class="min-w-full border-collapse">
                            <thead class="bg-gray-100">
                                <tr>
                                    <th class="px-4 py-3 text-left text-sm font-semibold">标题</th>
                                    <th class="px-4 py-3 text-left text-sm font-semibold">文章标识 (slug)</th>
                                    <th class="px-4 py-3 text-left text-sm font-semibold">当前密码</th>
                                    <th class="px-4 py-3 text-left text-sm font-semibold">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                `;
                for (const post of results) {
                    const escapedTitle = post.title.replace(/[&<>]/g, function(m) {
                        if (m === '&') return '&amp;';
                        if (m === '<') return '&lt;';
                        if (m === '>') return '&gt;';
                        return m;
                    });
                    html += `
                        <tr class="border-b hover:bg-gray-50">
                            <td class="px-4 py-3 text-sm">${escapedTitle}</td>
                            <td class="px-4 py-3 text-sm font-mono">${post.slug}</td>
                            <td class="px-4 py-3">
                                <div class="flex items-center gap-2">
                                    <span class="font-mono text-sm bg-gray-100 px-2 py-1 rounded">${post.password}</span>
                                    <button onclick="copyPassword('${post.password}')" class="copy-btn text-xs bg-gray-200 hover:bg-blue-600 hover:text-white px-2 py-1 rounded transition">📋 复制</button>
                                </div>
                            </td>
                            <td class="px-4 py-3">
                                <a href="https://github.com/857d/RyuChan/blob/main/src/content/blog/${post.slug}.md" target="_blank" class="text-blue-600 hover:text-blue-800 text-sm">📄 查看文件</a>
                            </td>
                        </tr>
                    `;
                }
                html += `
                            </tbody>
                        </table>
                        <p class="text-sm text-gray-500 mt-4">共 ${results.length} 篇加密文章</p>
                    </div>
                `;
                resultDiv.innerHTML = html;
            } catch (err) {
                console.error(err);
                resultDiv.innerHTML = `<div class="text-center py-8 text-red-500"><svg class="w-12 h-12 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><p>读取失败：${err.message}</p></div>`;
            }
        }

        function copyPassword(password) {
            navigator.clipboard.writeText(password);
            alert('密码已复制: ' + password);
        }
    </script>
</body>
</html>
